# Community detection rules for aur-scan.
#
# Drop .toml files like this into any of:
#   /usr/share/aur-scanner/rules.d/      (distro/package-shipped)
#   /etc/aur-scanner/rules.d/            (system administrator)
#   ~/.config/aur-scanner/rules.d/       (per user)
#
# Every rule's `id` must be UNIQUE across the whole catalog (built-in + yours).
# Run `aur-scan codes` to see the full index, or `aur-scan explain <ID>`.
# Use a distinct prefix for your org (e.g. ACME-001) to avoid collisions.
#
# Each rule is matched line-by-line against the PKGBUILD and/or install script.
# Severity: critical | high | medium | low | info
# Category: command_injection, privilege_escalation, network_security,
#           data_exfiltration, malicious_code, cryptography, configuration,
#           dependencies, obfuscation, credential_theft, persistence,
#           cryptomining, suspicious_metadata
# file_types: pkgbuild, install_script

[[rule]]
id = "EXAMPLE-001"
name = "Example: references example.com"
description = "Demonstration rule. Flags any source/command that references example.com."
severity = "info"
category = "configuration"
recommendation = "This is only an example rule; delete or replace it."
file_types = ["pkgbuild", "install_script"]

[[rule.patterns]]
type = "regex"
pattern = "example\\.com"
